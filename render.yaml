services:
  - type: web
    name: api_e-report_v0.2
    runtime: php
    repo: https://github.com/xamonxx/api_e-report_v0.2
    branch: master
    region: singapore
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader --no-interaction
    startCommand: bash start.sh
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: database
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: LOG_LEVEL
        value: error
      - key: SESSION_SECURE_COOKIE
        value: "true"
