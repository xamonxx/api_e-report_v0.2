version: "2"
type: frontend
tech_stack:
  - PHP
  - Laravel 11
  - Blade Templates
  - Alpine.js
  - Tailwind CSS
  - Vite
  - Flatpickr
  - SweetAlert2
routes:
  - path: /login
    file: resources/views/auth/login.blade.php
    auth_required: false
    description: User login page with email/password authentication
  - path: /
    file: resources/views/dashboard/index.blade.php
    auth_required: true
    description: Main dashboard with stats overview
  - path: /consultations
    file: resources/views/consultations/index.blade.php
    auth_required: true
    description: Leads management listing with create/edit modals
  - path: /consultations/create
    file: resources/views/consultations/create.blade.php
    auth_required: true
    description: Create new consultation lead form
  - path: /consultations/{id}
    file: resources/views/consultations/show.blade.php
    auth_required: true
    description: Consultation detail view with notes and reminders
  - path: /consultations/{id}/edit
    file: resources/views/consultations/edit.blade.php
    auth_required: true
    description: Edit consultation lead form
  - path: /analytics
    file: resources/views/analytics/index.blade.php
    auth_required: true
    description: Analytics dashboard with charts and reports
  - path: /settings
    file: resources/views/settings/index.blade.php
    auth_required: true
    description: User account and theme settings
  - path: /accounts
    file: resources/views/accounts/index.blade.php
    auth_required: true
    description: Account management (super admin only)
  - path: /master-data
    file: resources/views/master-data/index.blade.php
    auth_required: true
    description: Master data management for categories, statuses, users (super admin only)
  - path: /audit-logs
    file: resources/views/audit-logs/index.blade.php
    auth_required: true
    description: Audit log viewer (super admin only)
features:
  - name: User Login
    description: Login with email and password credentials, includes dark/light theme toggle and bug report modal
    files:
      - resources/views/auth/login.blade.php
      - resources/views/layouts/guest.blade.php
      - app/Http/Controllers/AuthController.php
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Check 'Ingat saya' checkbox
      - Click 'Masuk' button to submit
      - Toggle dark/light theme with theme switch
      - Click 'Hubungi Developer (Lapor Bug)' button
      - Fill bug report textarea in modal
      - Click 'Kirim Laporan via WhatsApp' to submit bug report
      - See inline error if bug report textarea is empty
    api_calls:
      - method: POST
        endpoint: /login
    auth_required: false
  - name: Leads Management
    description: View, create, edit, and delete consultation leads with filtering and search
    files:
      - resources/views/consultations/index.blade.php
      - app/Http/Controllers/ConsultationController.php
    entry_route: /consultations
    user_interactions:
      - Search leads by name, phone, or ID
      - Filter by status, account, date range
      - Click 'Tambah Lead' to open create modal
      - Fill client name, phone, location, product, status fields
      - Click edit button on a row to open edit modal
      - Click delete button to remove a lead
      - Click 'Import' to upload CSV
      - Click 'Export' to download data
    api_calls:
      - method: POST
        endpoint: /consultations
      - method: PUT
        endpoint: /consultations/{id}
      - method: DELETE
        endpoint: /consultations/{id}
    auth_required: true
  - name: Dashboard
    description: Overview dashboard showing key metrics and recent activity
    files:
      - resources/views/dashboard/index.blade.php
      - app/Http/Controllers/DashboardController.php
    entry_route: /
    user_interactions:
      - View total leads, follow-ups, conversions stats
      - View recent consultation list
    api_calls: []
    auth_required: true
  - name: Analytics
    description: Analytics dashboard with product, status, and regional distribution charts
    files:
      - resources/views/analytics/index.blade.php
      - app/Http/Controllers/AnalyticsController.php
    entry_route: /analytics
    user_interactions:
      - Toggle period type (weekly/monthly)
      - View product distribution chart
      - View status distribution chart
      - Export analytics to Excel or PDF
    api_calls: []
    auth_required: true
  - name: Theme Customization
    description: Light/dark theme toggle and primary color customization
    files:
      - resources/views/settings/index.blade.php
      - app/Http/Controllers/SettingsController.php
      - resources/js/app.js
    entry_route: /settings
    user_interactions:
      - Toggle dark/light mode
      - Select preset color or enter custom hex color
      - Preview color changes live
      - Save theme settings
    api_calls:
      - method: PUT
        endpoint: /settings/theme
    auth_required: true
known_limitations: []
